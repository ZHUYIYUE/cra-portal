<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRA Portal - 临床研究助理管理中心</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.6/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.40.2/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-hospital-alt"></i> CRA Portal</h2>
            <button class="sidebar-close" onclick="closeSidebar()" aria-label="关闭菜单">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <i class="fas fa-tachometer-alt"></i> 工作台
            </a>
            <a href="#" class="nav-item" data-page="projects">
                <i class="fas fa-folder-open"></i> 项目
            </a>
            <a href="#" class="nav-item" data-page="tasks">
                <i class="fas fa-tasks"></i> 待办事项
            </a>
            <a href="#" class="nav-item" data-page="findings">
                <i class="fas fa-search"></i> 监查问题
            </a>
            <a href="#" class="nav-item" data-page="ethics">
                <i class="fas fa-file-contract"></i> 伦理递交
            </a>
            <a href="#" class="nav-item" data-page="quality">
                <i class="fas fa-clipboard-check"></i> 数据质量
            </a>
            <a href="#" class="nav-item" data-page="recommend">
                <i class="fas fa-brain"></i> 状态推荐
            </a>
            <a href="#" class="nav-item" data-page="startup">
                <i class="fas fa-rocket"></i> 启动任务
            </a>
        </nav>
    </div>

    <div class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1 id="pageTitle">工作台</h1>
            <div class="global-search" id="globalSearch">
                <i class="fas fa-search global-search-icon"></i>
                <input id="globalSearchInput" type="search" placeholder="搜索项目、中心、PI、待办、问题" autocomplete="off" aria-label="全局搜索">
                <button class="global-search-clear" id="globalSearchClear" type="button" aria-label="清空搜索">
                    <i class="fas fa-times"></i>
                </button>
                <div class="global-search-results" id="globalSearchResults"></div>
            </div>
            <div class="header-actions">
                <button class="btn btn-sm btn-outline" onclick="backupData()" title="导出数据备份">
                    <i class="fas fa-download"></i> 备份
                </button>
                <button class="btn btn-sm btn-outline" onclick="showExportMenu()" title="导出Excel">
                    <i class="fas fa-file-excel"></i> 导出
                </button>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i> CRA
            </div>
        </header>

        <div class="page-content" id="pageContent"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script src="static/js/supabase-client.js"></script>
    <script src="static/js/utils.js"></script>
    <script src="static/js/dashboard.js"></script>
    <script src="static/js/projects.js"></script>
    <script src="static/js/tasks.js"></script>
    <script src="static/js/centers.js"></script>
    <script src="static/js/findings.js"></script>
    <script src="static/js/ethics.js"></script>
    <script src="static/js/data-quality.js"></script>
    <script src="static/app.js"></script>
</body>
</html>
